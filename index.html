<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h1 align="center"><strong><i>PERSONAL INFORMATION</i></strong></h1>
    <form align="center">
        
        <label for="Name">Name</label>
        <input type="text" id="Name" placeholder="Enter Your Name" maxlength="10" required>
    <br>
    <br>

        <label for="Age">Age</label>
        <input type="number" id="Age" placeholder="Enter Your Age" required>
    <br>
    <br>

        <label for="Email">Email</label>
        <input type="email" id="Email" placeholder="Enter Your Email" required>
    <br>    
    <br>

        <label for="Password">Password</label>
        <input type="password" id="Password" placeholder="Enter Your Password" required>
    <br>    
    <br>

        <label for="RollNumber">RollNumber</label>
        <input type="number" id="RollNumber" placeholder="Enter Your RollNumber" required>
    <br>    
    <br>

        <label for="CNIC">CNIC</label>
        <input type="number" id="CNIC" placeholder="Enter Your CNIC" required>
    <br>    
    <br>

        <label for="Gender">Gender</label>
        <input type="text" id="Gender" placeholder="Enter Your Gender" required>
    <br>    
    <br>

    
        <label for="Search">Search</label>
        <input type="search" id="Search" placeholder="Find Your Info" required>
    <br>    
    <br>

        <label for="Date">Date</label>
        <input type="date" id="Date" placeholder=" Please Enter Date" required>
    <br>    
    <br>

        <label for="File">File</label>
        <input type="file" id="File" placeholder=" Upload Your Documents" required>
    <br>    
    <br>

        <label for="Time">Time</label>
        <input type="time" id="Time" placeholder="Enter Your Birth Time" required>
    <br>    
    <br>
        <label for="About">About</label>
        <textarea type="textarea" id="About" placeholder="Right About Yourself" cols="30" rows="5"></textarea>
    </form>
</body>
</html>
